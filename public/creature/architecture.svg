<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 726" font-family="ui-monospace, 'SF Mono', Menlo, monospace" role="img" aria-label="CREATURE architecture. Input reaches a spine router that measures embedding distance against private memory centroids and classifies each request green (public) or red (private), escalating to a local judge only when uncertain, and failing closed to local. A judgment kernel compiled from Alex's principles gates the router and rides in every dispatched agent. Green requests may call a frontier cloud model as a tool that carries no memory; red requests stay on local Ollama or are skipped. Below sit three subsystems: a Hebbian memory that consolidates during idle dream cycles, the Keeper that feels needs and arbitrates the GPU, and fail-closed organs.">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#8f8a7c"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#7c9b6f"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#c58a5c"/></marker>
  </defs>

  <rect x="0" y="0" width="1200" height="726" fill="#100f0b"/>
  <rect x="0" y="0" width="1200" height="726" fill="none"/>

  <text x="44" y="50" fill="#e0b957" font-size="21" letter-spacing="4">THE GREEN / RED SPINE</text>
  <text x="44" y="74" fill="#8f8a7c" font-size="12.5" letter-spacing="0.5">how a request is judged before anything is allowed to act · private cognition never leaves the machine</text>

  <!-- input -->
  <text x="44" y="168" fill="#8f8a7c" font-size="12.5">a request</text>
  <line x1="118" y1="163" x2="248" y2="163" stroke="#8f8a7c" stroke-width="1.4" marker-end="url(#a)"/>

  <!-- SPINE ROUTER -->
  <rect x="250" y="118" width="372" height="92" rx="5" fill="#1a190f" stroke="#e0b957" stroke-width="1.4"/>
  <text x="270" y="148" fill="#efe8d3" font-size="15" letter-spacing="1">SPINE ROUTER</text>
  <text x="270" y="171" fill="#9c9788" font-size="12">measures embedding distance to my</text>
  <text x="270" y="188" fill="#9c9788" font-size="12">private memory centroids · fails closed</text>

  <!-- green lane -> cloud -->
  <line x1="622" y1="150" x2="758" y2="150" stroke="#7c9b6f" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="638" y="142" fill="#7c9b6f" font-size="11">green · public</text>
  <rect x="760" y="120" width="400" height="60" rx="5" fill="#141a11" stroke="#7c9b6f" stroke-width="1.3"/>
  <text x="780" y="146" fill="#adc49f" font-size="13.5">CLOUD — a frontier model, as a tool</text>
  <text x="780" y="166" fill="#7f8c73" font-size="11">given a self-contained task · carries no memory</text>

  <!-- red lane -> local -->
  <line x1="622" y1="184" x2="758" y2="214" stroke="#c58a5c" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="636" y="212" fill="#c58a5c" font-size="11">red · private</text>
  <rect x="760" y="196" width="400" height="60" rx="5" fill="#1d160f" stroke="#c58a5c" stroke-width="1.3"/>
  <text x="780" y="222" fill="#d9a575" font-size="13.5">LOCAL ONLY — Ollama, on my hardware</text>
  <text x="780" y="242" fill="#8f7c6a" font-size="11">or it simply skips the request</text>

  <!-- escalation note -->
  <text x="270" y="236" fill="#6f6a5c" font-size="11">on the fence → a local judge decides, never a guess</text>

  <!-- router down to kernel -->
  <line x1="436" y1="210" x2="436" y2="268" stroke="#8f8a7c" stroke-width="1.4" marker-end="url(#a)"/>

  <!-- JUDGMENT KERNEL -->
  <rect x="250" y="270" width="372" height="94" rx="5" fill="#1a190f" stroke="#e0b957" stroke-width="1.4"/>
  <text x="270" y="300" fill="#efe8d3" font-size="15" letter-spacing="1">JUDGMENT KERNEL</text>
  <text x="270" y="323" fill="#9c9788" font-size="12">my principles, compiled and weighted</text>
  <text x="270" y="341" fill="#9c9788" font-size="12">sovereignty = 1.00 · a ratchet that only</text>
  <text x="270" y="358" fill="#9c9788" font-size="12">tightens a decision, never loosens it</text>

  <!-- kernel rides in dispatched agents (dashed to cloud lane) -->
  <path d="M622 300 L757 150" stroke="#5f5a4e" stroke-width="1.1" stroke-dasharray="4 5" fill="none"/>
  <text x="640" y="286" fill="#6f6a5c" font-size="10.5">rides in every dispatched agent</text>

  <!-- fan to three subsystems -->
  <path d="M340 364 L340 400 L226 400 L226 436" stroke="#8f8a7c" stroke-width="1.3" fill="none" marker-end="url(#a)"/>
  <path d="M436 364 L436 400 L586 400 L586 436" stroke="#8f8a7c" stroke-width="1.3" fill="none" marker-end="url(#a)"/>
  <path d="M532 364 L532 400 L946 400 L946 436" stroke="#8f8a7c" stroke-width="1.3" fill="none" marker-end="url(#a)"/>

  <!-- MEMORY -->
  <rect x="56" y="438" width="340" height="150" rx="5" fill="#16150e" stroke="#403d33" stroke-width="1.2"/>
  <text x="76" y="468" fill="#cdbf8f" font-size="14" letter-spacing="1">MEMORY</text>
  <text x="76" y="493" fill="#9c9788" font-size="11.5">a Hebbian graph, not a log</text>
  <text x="76" y="512" fill="#9c9788" font-size="11.5">co-use strengthens · disuse decays</text>
  <text x="76" y="531" fill="#9c9788" font-size="11.5">principles + voice never decay</text>
  <text x="76" y="558" fill="#7c9b6f" font-size="11.5">idle → NREM compress · REM recombine</text>
  <!-- dream loop -->
  <path d="M356 548 q34 8 34 -22 q0 -30 -34 -22" fill="none" stroke="#7c9b6f" stroke-width="1.2" marker-end="url(#ag)"/>

  <!-- KEEPER -->
  <rect x="416" y="438" width="340" height="150" rx="5" fill="#16150e" stroke="#403d33" stroke-width="1.2"/>
  <text x="436" y="468" fill="#cdbf8f" font-size="14" letter-spacing="1">THE KEEPER</text>
  <text x="436" y="493" fill="#9c9788" font-size="11.5">interoception — it feels a need</text>
  <text x="436" y="512" fill="#9c9788" font-size="11.5">arbitrates the GPU like a scarce organ</text>
  <text x="436" y="531" fill="#9c9788" font-size="11.5">a homeostat, not a scheduler</text>
  <text x="436" y="558" fill="#c58a5c" font-size="11.5">born from a real starvation bug</text>

  <!-- ORGANS -->
  <rect x="776" y="438" width="368" height="150" rx="5" fill="#16150e" stroke="#403d33" stroke-width="1.2"/>
  <text x="796" y="468" fill="#cdbf8f" font-size="14" letter-spacing="1">ORGANS</text>
  <text x="796" y="493" fill="#9c9788" font-size="11.5">a fail-closed contract each one signs</text>
  <text x="796" y="512" fill="#9c9788" font-size="11.5">membrane · toolbox · genome</text>
  <text x="796" y="531" fill="#9c9788" font-size="11.5">three laws, default = refuse</text>
  <text x="796" y="558" fill="#8f8a7c" font-size="11.5">email · scribe · mirror · journal · hands</text>

  <!-- legend -->
  <rect x="44" y="628" width="11" height="11" fill="#7c9b6f"/><text x="62" y="638" fill="#8f8a7c" font-size="11.5">green — public, may reach the cloud</text>
  <rect x="330" y="628" width="11" height="11" fill="#c58a5c"/><text x="348" y="638" fill="#8f8a7c" font-size="11.5">red — private, stays on the box</text>
  <line x1="600" y1="633" x2="626" y2="633" stroke="#5f5a4e" stroke-width="1.1" stroke-dasharray="4 5"/><text x="634" y="638" fill="#8f8a7c" font-size="11.5">the kernel travels with every agent</text>
  <text x="44" y="668" fill="#6f6a5c" font-size="11">The law, in one line: the cloud is a tool the local mind chooses to call. It is never the mind, and it never carries a memory off the machine.</text>
</svg>
