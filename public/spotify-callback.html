<!DOCTYPE html>
<html>
<head><title>connecting...</title></head>
<body style="background:#000;color:#fff;font-family:system-ui;display:flex;align-items:center;justify-content:center;height:100vh;margin:0">
<p id="msg" style="opacity:0.3;font-size:12px;letter-spacing:2px">connecting to strudelvision...</p>
<script>
var code = new URLSearchParams(window.location.search).get('code');
if (code && window.opener) {
  window.opener.postMessage({ type: 'spotify-callback', code: code }, '*');
  document.getElementById('msg').textContent = 'connected. closing...';
  setTimeout(function() { window.close(); }, 1000);
} else if (code) {
  window.location.href = 'http://127.0.0.1:8888/?code=' + code;
} else {
  document.getElementById('msg').textContent = 'no auth code received.';
}
</script>
</body>
</html>
